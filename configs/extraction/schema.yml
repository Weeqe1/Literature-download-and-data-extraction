# Nano Fluorescent Probe Extraction Schema
# Version 3.0 - ML-Ready "True God" 12-Field Schema

version: 3.0.0

paper_meta:
  - {name: title, type: str, desc: "Paper Title"}
  - {name: doi, type: str, desc: "DOI"}
  - {name: year, type: int, desc: "Year of Publication"}

probe_features:
  - {name: core_material, type: str, desc: "Core material/composition (e.g., Si, CdSe, Carbon dot, NaErF4). REQUIRED."}
  - {name: shell_or_dopant, type: str, desc: "Shell material or dopant elements (e.g., ZnS, Er, Nd)."}
  - {name: surface_ligands_modifiers, type: str, desc: "Surface ligands, polymers, or targeting molecules (e.g., FITC, PEG, Aptamer)."}
  - {name: size_nm, type: float, unit: nm, desc: "Average size/diameter in nanometers."}
  - {name: excitation_wavelength_nm, type: float, unit: nm, desc: "Excitation wavelength."}
  - {name: emission_wavelength_nm, type: float, unit: nm, desc: "Emission wavelength peak(s). REQUIRED."}
  - {name: quantum_yield_percent, type: float, unit: "%", desc: "Fluorescence quantum yield."}
  - {name: target_analyte, type: str, desc: "Target analyte or molecule detected (e.g., SARS-CoV-2 N protein, Granzyme B, Cu2+). REQUIRED."}
  - {name: limit_of_detection, type: str, desc: "Limit of Detection (LOD) with units."}
  - {name: test_solvent_or_medium, type: str, desc: "Testing medium or solvent (e.g., PBS, human serum, DI water)."}
  - {name: response_type, type: enum, enum: [turn-on, turn-off, ratiometric, other], desc: "Fluorescence response mechanism."}
  - {name: linear_range, type: str, desc: "Linear detection range."}
